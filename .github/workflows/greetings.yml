name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: " Welcome to YMAZE! Thank you so much for opening your first issue here. We appreciate you taking the time to help improve the project.' first issue"
        pr-message: "Welcome to YMAZE! Thank you for submitting your very first pull request! We're thrilled to have you contributing. A maintainer will review your changes shortly. In the meantime, please make sure your code aligns with our contribution guidelines.' first pull request"
